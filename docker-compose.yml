version: '3.8'

services:
  backend:
    build:
      context: ./verisource-ai/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./verisource-ai/backend/verisource.db:/app/verisource.db
      - ./verisource-ai/backend/vector_store:/app/vector_store
    env_file:
      - ./verisource-ai/backend/.env
    environment:
      - DATABASE_URL=sqlite:///./verisource.db

  frontend:
    build:
      context: ./verisource-ai/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000

